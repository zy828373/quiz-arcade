name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "VITE_GOOGLE_APP_SCRIPT_URL=${{ secrets.VITE_GOOGLE_APP_SCRIPT_URL }}" >> .env
          echo "VITE_PASS_THRESHOLD=${{ vars.VITE_PASS_THRESHOLD || '8' }}" >> .env
          echo "VITE_QUESTION_COUNT=${{ vars.VITE_QUESTION_COUNT || '10' }}" >> .env

      - name: Build
        run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
